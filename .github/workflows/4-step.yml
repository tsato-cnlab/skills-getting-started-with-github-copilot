name: Step 4 - ステップ 4

on:
  push:
    branches:
      - "accelerate-with-copilot"

permissions:
  contents: read
  actions: write
  issues: write

env:
  STEP_5_FILE: ".github/steps/5-step.md"

jobs:
  find_exercise:
    name: 演習 Issue を検索
    uses: ./.github/workflows/ja-find-exercise-issue.yml

  check_step_work:
    name: ステップの作業を確認
    runs-on: ubuntu-latest
    needs: [find_exercise]
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Find last comment
        id: find-last-comment
        uses: peter-evans/find-comment@v3
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          direction: last

      - name: Update comment - checking work
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          file: .github/ja-templates/step-feedback/checking-work.md
          edit-mode: replace

      # START: 実践作業を確認

      - name: Check for pytest keyphrase in requirements.txt
        id: check-for-pytest
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v1
        with:
          text-file: requirements.txt
          keyphrase: pytest

      - name: Check if tests directory exists
        id: check-tests-dir
        continue-on-error: true
        run: |
          if find . -name "tests" -type d | grep -q .; then
            echo "Tests directory found"
            exit 0
          else
            echo "Tests directory not found"
            exit 1
          fi

      - name: Update comment - step results
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          edit-mode: replace
          file: .github/ja-templates/step-feedback/step-results-table.md
          vars: |
            step_number: 4
            results_table:
              - description: "requirements.txt に pytest があることを確認しました"
                passed: ${{ steps.check-for-pytest.outcome == 'success' }}
              - description: "別ディレクトリに tests が追加されていることを確認しました"
                passed: ${{ steps.check-tests-dir.outcome == 'success' }}

      # END: 実践作業を確認

      - name: すべての確認が通らなければジョブを失敗させる
        if: contains(steps.*.outcome, 'failure')
        run: exit 1

  post_next_step_content:
    name: 次のステップを投稿
    needs: [find_exercise, check_step_work]
    runs-on: ubuntu-latest
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create comment - step finished
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: .github/ja-templates/step-feedback/step-finished-prepare-next-step.md
          vars: |
            next_step_number: 5

      - name: Create comment - add step content
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ${{ env.STEP_5_FILE }}

      - name: Create comment - watching for progress
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: .github/ja-templates/step-feedback/watching-for-progress.md

      - name: Disable current workflow and enable next one
        run: |
          gh workflow disable "${{github.workflow}}"
          gh workflow enable "5-step.yml"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
