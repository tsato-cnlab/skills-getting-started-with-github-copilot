name: Step 1 - ステップ 1

on:
  push:
    # Trigger on pushes to any branch except the protected `main` branch
    branches-ignore:
      - main

permissions:
  contents: read
  actions: write
  issues: write

env:
  STEP_2_FILE: ".github/steps/2-step.md"

jobs:
  find_exercise:
    name: 演習 Issue を検索
    uses: ./.github/workflows/ja-find-exercise-issue.yml

  check_step_work:
    name: ステップの作業を確認
    runs-on: ubuntu-latest
    needs: [find_exercise]
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Find last comment
        id: find-last-comment
        uses: peter-evans/find-comment@v3
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          direction: last

      - name: Update comment - checking work
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          file: .github/ja-templates/step-feedback/checking-work.md
          edit-mode: replace

      # START: 実践作業を確認

      - name: Check branch name is correct
        id: check-branch
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v1
        with:
          # Check the branch ref directly
          text: ${{ github.ref }}
          keyphrase: accelerate-with-copilot
          case-sensitive: true
          minimum-occurrences: 1
          maximum-occurrences: 1

      - name: Update comment - step results
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          edit-mode: replace
          file: .github/ja-templates/step-feedback/step-results-table.md
          vars: |
            step_number: 1
            results_table:
              - description: "ブランチ名が accelerate-with-copilot であることを確認しました"
                passed: ${{ steps.check-branch.outcome == 'success' }}

      # END: 実践作業を確認

      - name: 確認に失敗した場合はジョブを失敗させる
        if: ${{ steps.check-branch.outcome != 'success' }}
        run: exit 1

  post_next_step_content:
    name: 次のステップを投稿
    needs: [find_exercise, check_step_work]
    runs-on: ubuntu-latest
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create comment - step finished
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: .github/ja-templates/step-feedback/step-finished-prepare-next-step.md
          vars: |
            next_step_number: 2

      - name: Create comment - add step content
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ${{ env.STEP_2_FILE }}

      - name: Create comment - watching for progress
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: .github/ja-templates/step-feedback/watching-for-progress.md

      - name: Disable current workflow and enable next one
        run: |
          gh workflow disable "${{github.workflow}}"
          gh workflow enable "2-step.yml"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
